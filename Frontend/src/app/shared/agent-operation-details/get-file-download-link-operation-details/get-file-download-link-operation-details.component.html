<div class="op-details__section-title">
    File — create download link
</div>

<div class="op-details__item"
    [class.op-details__item--clickable]="workspaceExternalId()"
    (click)="openFile()">
    <i class="icon icon-xl icon-nucleo-file op-details__icon"></i>
    <div class="op-details__text">
        <div class="op-details__name">{{ details().name ?? details().fileExternalId }}</div>
        @if(details().path) {
            <div class="op-details__path">{{ details().path }}</div>
        }
        <div class="op-details__path">link valid {{ details().expiresInMinutes ?? 15 }} minutes</div>
    </div>
</div>

<div class="op-details__notice">
    <i class="icon icon-md icon-nucleo-info op-details__notice-icon"></i>
    <span>This produces a public link — anyone who has it can download the file without signing in, until it expires.</span>
</div>
