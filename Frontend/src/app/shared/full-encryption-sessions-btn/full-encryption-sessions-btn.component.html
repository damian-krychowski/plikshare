@if (auth.isEncryptionConfigured()) {
    @if (auth.isEncryptionUnlocked()) {
        <button class="top-nav-btn"
            aria-label="Encryption unlocked"
            mat-flat-button
            matTooltip="Encryption unlocked — click to lock"
            matTooltipPosition="below"
            (click)="openLockDialog()">
            <i class="icon icon-xl icon-nucleo-lock-open"></i>
        </button>
    } @else {
        <button class="top-nav-btn"
            aria-label="Encryption locked"
            mat-flat-button
            matTooltip="Encryption locked — click to unlock"
            matTooltipPosition="below"
            (click)="openUnlockDialog()">
            <i class="icon icon-xl icon-nucleo-lock"></i>
        </button>
    }
}
