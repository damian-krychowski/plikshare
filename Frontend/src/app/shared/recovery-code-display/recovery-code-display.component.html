<div class="recovery-code">
    <div class="recovery-code__title">
        {{ data.title }}
    </div>

    <app-config-card
        title="Recovery code"
        [description]="'Shown only once. ' + data.warning">
        <div configCardActions>
            <app-action-btn
                tooltip="Download as .txt"
                icon="icon-nucleo-download"
                (clicked)="downloadAsFile()">
            </app-action-btn>
        </div>

        <div class="recovery-code__code"
            [class.recovery-code__code--copied]="copied()"
            role="button"
            tabindex="0"
            (click)="copyToClipboard()"
            (keydown.enter)="copyToClipboard()"
            (keydown.space)="copyToClipboard()"
            [attr.aria-label]="copied() ? 'Recovery code copied to clipboard' : 'Copy recovery code to clipboard'">
            <div class="recovery-code__grid">
                @for (word of words(); track $index; let i = $index) {
                    <div class="recovery-code__word">
                        <span class="recovery-code__word-number">{{ i + 1 }}.</span>
                        <span class="recovery-code__word-text">{{ word }}</span>
                    </div>
                }
            </div>

            <div class="recovery-code__hint">
                <i class="icon icon-sm" [class.icon-nucleo-copy]="!copied()" [class.icon-lucide-check]="copied()"></i>
                <span>{{ copied() ? 'Copied' : 'Click to copy' }}</span>
            </div>
        </div>
    </app-config-card>

    <div class="recovery-code__danger-notice">
        {{ data.dangerNotice }}
    </div>

    <mat-checkbox class="recovery-code__confirm"
        [checked]="hasSaved()"
        (change)="hasSaved.set($event.checked)">
        I have saved this code in a safe place. I understand it will not be shown again.
    </mat-checkbox>

    <div class="recovery-code__actions">
        <button class="questionaire__btn" mat-flat-button type="button"
            [disabled]="!hasSaved()"
            (click)="onDone()"
            aria-label="Done">
            Done
        </button>
    </div>
</div>
