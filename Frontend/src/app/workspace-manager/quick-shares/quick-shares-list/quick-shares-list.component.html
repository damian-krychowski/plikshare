<div class="mt-3 hide-on-mobile"></div>

<div class="title-header">
    <div>
        Your quick shares:
    </div>
</div>

<div class="mt-2"></div>

@for (share of quickShares(); track share.externalId) {
    <app-quick-share-item
        [quickShare]="share"
        (deleted)="onShareDeleted(share)">
    </app-quick-share-item>
}

@if (!isLoading() && hasNoShares()) {
    <div>
        <div class="mt-2"></div>

        <app-item-btn
            title="Create a quick share"
            subtitle="Open the explorer, select files or folders, then click 'Quick share selection'."
            icon="icon-nucleo-share"
            (clicked)="goToExplorer()">
        </app-item-btn>
    </div>
}
