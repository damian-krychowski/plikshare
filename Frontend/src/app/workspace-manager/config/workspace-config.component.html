<div class="mt-3"></div>

<div class="title-header">
    <div>
        Workspace configuration:
    </div>
</div>

<div class="mt-2"></div>

<div class="config-container">
    <app-config-card
        title="Workspace size"
        description="Set a maximum amount of storage this workspace can use, or leave it unlimited.">
        <app-workspace-size-config
            [maxSizeInBytes]="maxSizeInBytes()"
            (configChanged)="onMaxSizeInBytesChange($event)">
        </app-workspace-size-config>
    </app-config-card>

    <app-config-card
        title="Team members"
        description="Set a maximum number of members allowed in this workspace, or leave it unlimited.">
        <app-workspace-team-config
            [maxTeamMembers]="maxTeamMembers()"
            (configChanged)="onMaxTeamMembersChange($event)">
        </app-workspace-team-config>
    </app-config-card>

    <app-config-card
        title="Trash"
        description="When enabled, deleted files are moved to the trash and can be restored until they are permanently removed.">
        @if (trashPolicy(); as policy) {
            <app-trash-policy-config
                [trashPolicy]="policy"
                (configChanged)="onTrashPolicyChange($event)">
            </app-trash-policy-config>
        }
    </app-config-card>

    @if (isFfmpegAvailable()) {
        <app-config-card
            title="Image dimensions"
            description="Extract image pixel dimensions on upload so previews open with the correct aspect ratio. Turning it on backfills existing images in this workspace.">
            @if (imageDimensionsPolicy(); as policy) {
                <app-image-dimensions-policy-config
                    [imageDimensions]="policy"
                    (configChanged)="onImageDimensionsPolicyChange($event)">
                </app-image-dimensions-policy-config>
            }

            @if (backfillProgress(); as progress) {
                <div class="mt-2">
                    <app-batch-progress
                        label="Extracting dimensions of existing images…"
                        [done]="progress.completed + progress.failed"
                        [total]="progress.total"
                        [failed]="progress.failed">
                    </app-batch-progress>
                </div>
            }
        </app-config-card>
    }

    @if (canConfigureAuditLog()) {
        <app-config-card
            title="Audit log"
            description="Choose which audit-log events are recorded for this workspace and override their severities."
            mode="side">
            @if (auditLogSummaryText(); as summary) {
                <span class="ws-summary-chip"
                    [class.ws-summary-chip--customized]="isAuditLogCustomized()">
                    {{ summary }}
                </span>
            }
            <app-action-text-btn
                text="Configure audit log"
                (clicked)="goToAuditLogPolicy()">
            </app-action-text-btn>
        </app-config-card>
    }
</div>
