<div class="app-container">
    <div class="top-bar">
        <div class="top-bar__header">
            <button class="top-nav-btn"
                aria-label="Account"
                mat-flat-button
                matTooltip="Go back to Account"
                matTooltipPosition="below"
                (click)="goToAccount()">
                <div class="icon-merge">
                    <i class="icon icon-lg icon-lucide-chevron-left icon-merge--back"></i>
                    <i class="icon icon-xl icon-nucleo-robot icon-merge--front"></i>
                </div>
            </button>

            <div class="flex-column">
                <div class="top-bar__title">
                    Agents
                </div>
            </div>
        </div>
    </div>


    <div class="content">
        <div class="explanation">
            Agents are machine accounts that access PlikShare through an API token.
            Create an agent, then grant it access to specific workspaces or boxes.
        </div>

        <div class="mt-3"></div>

        <div class="title-header">
            <div>
                Agents:
            </div>

            <app-action-btn
                class="ml-auto"
                tooltip="Create agent"
                icon="icon-lucide-plus"
                (clicked)="onCreateAgent()">
            </app-action-btn>
        </div>

        <div class="mt-2"></div>

        @for(agent of agents(); track agent.externalId) {
            <app-agent-item
                [agent]="agent"
                (clicked)="goToAgent(agent)"
                (deleted)="onAgentDelete($event, agent)">
            </app-agent-item>
        } @empty {
            @if(isInitialized()){
                <div class="explanation">
                    No agents yet. Create one to get started.
                </div>
            }
        }

        <div class="mt-2"></div>

        <app-item-btn
            title="Create agent"
            subtitle="Click here to create a new agent!"
            icon="icon-nucleo-robot"
            (clicked)="onCreateAgent()">
        </app-item-btn>

        <div class="mt-5"></div>
    </div>
</div>
