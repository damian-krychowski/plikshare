<div class="agent-token">
    <div class="agent-token__title">
        {{ data.title }}
    </div>

    <app-config-card
        title="API token"
        description="Shown only once — copy it now and store it somewhere safe. If you lose it, rotate the token to generate a new one.">
        <div class="agent-token__link"
            [class.agent-token__link--copied]="copied()"
            role="button"
            tabindex="0"
            (click)="copyToClipboard()"
            (keydown.enter)="copyToClipboard()"
            (keydown.space)="copyToClipboard()"
            [attr.aria-label]="copied() ? 'Token copied to clipboard' : 'Copy token to clipboard'">
            <i class="icon icon-lg icon-nucleo-lock agent-token__link-leading"></i>
            <span class="agent-token__link-value">{{ data.token }}</span>
            <span class="agent-token__link-copy">
                <i class="icon icon-sm" [class.icon-nucleo-copy]="!copied()" [class.icon-lucide-check]="copied()"></i>
            </span>
        </div>
    </app-config-card>

    <div class="agent-token__danger-notice">
        Anyone with this token can act as this agent. Treat it like a password.
    </div>

    <mat-checkbox class="agent-token__confirm"
        [checked]="hasSaved()"
        (change)="hasSaved.set($event.checked)">
        I have saved this token in a safe place. I understand it will not be shown again.
    </mat-checkbox>

    <div class="agent-token__actions">
        <button class="questionaire__btn" mat-flat-button type="button"
            [disabled]="!hasSaved()"
            (click)="onDone()"
            aria-label="Done">
            Done
        </button>
    </div>
</div>
