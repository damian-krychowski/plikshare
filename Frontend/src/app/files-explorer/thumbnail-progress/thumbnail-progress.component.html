@if(progress(); as p) {
    <span class="thumb-progress">
        <i class="icon icon-nucleo-image-scale thumb-progress__icon"></i>
        <span class="thumb-progress__bar">
            <span class="thumb-progress__fill" [style.width.%]="p.percent"></span>
        </span>
        <span class="thumb-progress__value">{{ p.done }}/{{ p.total }}</span>

        <span class="thumb-progress__elapsed" #elapsed></span>

        @if(activeBatchIds().length > 0) {
            <button
                type="button"
                class="thumb-progress__cancel"
                appConfirmOperation
                [operationItem]="'thumbnail generation'"
                [verb]="'stop'"
                [isOperationDanger]="true"
                [operationSubtitle]="'Files still in the queue will not be processed.'"
                (confirmedClick)="cancel()"
                matTooltip="Cancel"
                aria-label="Cancel thumbnail generation">×</button>
        }
    </span>
}
