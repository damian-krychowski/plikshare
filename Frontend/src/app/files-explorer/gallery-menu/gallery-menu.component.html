<button type="button" class="gallery-menu__trigger" (click)="toggle()">
    {{ triggerLabel() }}
    <i class="icon icon-lucide-chevron-down"></i>
</button>

@if(isOpen()) {
    <div class="gallery-menu__panel">
        <div class="gallery-menu__section-label">Layout</div>

        <button type="button" class="gallery-menu__item"
            [class.gallery-menu__item--active]="isLayoutActive('justified')"
            (click)="selectLayout('justified')">
            <span class="gallery-menu__item-label">Justified</span>
            <i class="icon" [class.icon-lucide-check]="isLayoutActive('justified')"></i>
        </button>

        <button type="button" class="gallery-menu__item"
            [class.gallery-menu__item--active]="isLayoutActive('mosaic')"
            (click)="selectLayout('mosaic')">
            <span class="gallery-menu__item-label">Mosaic</span>
            <i class="icon" [class.icon-lucide-check]="isLayoutActive('mosaic')"></i>
        </button>

        <button type="button" class="gallery-menu__item"
            [class.gallery-menu__item--active]="isLayoutActive('grid')"
            (click)="selectLayout('grid')">
            <span class="gallery-menu__item-label">Grid</span>
            <i class="icon" [class.icon-lucide-check]="isLayoutActive('grid')"></i>
        </button>

        <div class="gallery-menu__divider"></div>

        <div class="gallery-menu__section-label">Tile size</div>

        <div class="gallery-menu__segmented">
            <button type="button"
                class="gallery-menu__segmented-btn"
                [class.gallery-menu__segmented-btn--active]="isTileSizeActive('small')"
                (click)="selectTileSize('small')">
                S
            </button>

            <button type="button"
                class="gallery-menu__segmented-btn"
                [class.gallery-menu__segmented-btn--active]="isTileSizeActive('medium')"
                (click)="selectTileSize('medium')">
                M
            </button>

            <button type="button"
                class="gallery-menu__segmented-btn"
                [class.gallery-menu__segmented-btn--active]="isTileSizeActive('large')"
                (click)="selectTileSize('large')">
                L
            </button>
        </div>
    </div>
}
